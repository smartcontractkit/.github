name: ecr-image-exists
description: |
  Checks whether one or more docker image tags already exist in ECR.

inputs:
  docker-registry-url:
    required: true
    description: |
      Hostname for the docker image registry.

      Examples:
        public.ecr.aws
        <account-id>.dkr.ecr.<region>.amazonaws.com

  docker-repository-name:
    required: true
    description: |
      Name of the Docker repository excluding hostname. Excludes any tags.
      Public ECR repositories include a registry alias and a forward slash.

      Examples:
        chainlink/chainlink # Public ECR
        chainlink/ccip      # Public ECR
        my-repo-name        # Private ECR

  tags:
    required: true
    description: |
      Newline-delimited Docker tags to check for existence.

  assert-non-existence:
    required: false
    default: "false"
    description: |
      If true, the action will fail if any of the provided tags already exist in ECR.
      If false, the action will succeed regardless, and the 'exists' output can be used to check for existing tags.

  registry-auth:
    required: false
    default: "false"
    description: |
      Whether to perform registry login in this action.
      If false, assumes registry auth is already configured.

  aws-region:
    description: |
      AWS region for ECR. For public images, use: us-east-1
    required: false
    default: "us-east-1"

  aws-role-arn:
    description: |
      Optional AWS role ARN to assume before checking tags.
      If omitted, assumes AWS credentials are already configured.
    required: false

  aws-role-duration-seconds:
    required: false
    default: "3600"
    description: |
      The duration to be logged into the AWS role for.

outputs:
  exists:
    description: |
      Whether any of the provided image tags exist in ECR.
    value: ${{ steps.check.outputs.exists }}

runs:
  using: composite
  steps:
    - name: Validate inputs and derive ECR settings
      id: validate
      shell: bash
      env:
        INPUT_DOCKER_REGISTRY_URL: ${{ inputs.docker-registry-url }}
        INPUT_DOCKER_REPOSITORY_NAME: ${{ inputs.docker-repository-name }}
        INPUT_TAGS: ${{ inputs.tags }}
      run: |
        set -euo pipefail

        docker_registry_url="${INPUT_DOCKER_REGISTRY_URL%/}"
        docker_repository_name="${INPUT_DOCKER_REPOSITORY_NAME#/}"
        docker_repository_name="${docker_repository_name%/}"

        if [[ -z "$docker_registry_url" ]]; then
          echo "::error::Input 'docker-registry-url' is required."
          exit 1
        elif [[ -z "$docker_repository_name" ]]; then
          echo "::error::Input 'docker-repository-name' is required."
          exit 1
        elif [[ -z "${INPUT_TAGS}" ]]; then
          echo "::error::Input 'tags' must contain at least one tag."
          exit 1
        fi

        if [[ "$docker_registry_url" == "public.ecr.aws" ]]; then
          registry_type="public"

          if [[ "$docker_repository_name" != */* ]]; then
            echo "::error::For public ECR, 'docker-repository-name' must include the registry alias."
            echo "::error::Example: chainlink/chainlink"
            exit 1
          fi

          repository_name="$docker_repository_name"
        elif [[ "$docker_registry_url" =~ ^[0-9]{12}\.dkr\.ecr\.[a-z0-9-]+\.amazonaws\.com$ ]]; then
          registry_type="private"

          if [[ "$docker_repository_name" == */* ]]; then
            echo "::error::For private ECR, 'docker-repository-name' must not include a slash."
            echo "::error::Example: chainlink"
            exit 1
          fi

          repository_name="$docker_repository_name"
        else
          echo "::error::Unsupported docker-registry-url: ${docker_registry_url}"
          echo "::error::Expected 'public.ecr.aws' or '<account-id>.dkr.ecr.<region>.amazonaws.com'."
          exit 1
        fi

        tag_count=0
        while IFS= read -r tag; do
          tag="${tag%$'\r'}"
          [[ -n "$tag" ]] || continue
          tag_count=$((tag_count + 1))
        done <<< "${INPUT_TAGS}"

        if [[ "$tag_count" -eq 0 ]]; then
          echo "::error::Input 'tags' must contain at least one non-empty tag."
          exit 1
        fi

        echo "registry-type=${registry_type}" | tee -a "${GITHUB_OUTPUT}"
        echo "repository-name=${repository_name}" | tee -a "${GITHUB_OUTPUT}"

    - name: Configure AWS Credentials
      if: ${{ inputs.aws-role-arn != '' }}
      uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
      with:
        aws-region: ${{ inputs.aws-region }}
        role-to-assume: ${{ inputs.aws-role-arn }}
        role-duration-seconds: ${{ inputs.aws-role-duration-seconds }}
        mask-aws-account-id: true

    - name: Login to Amazon ECR
      if: ${{ inputs.registry-auth == 'true' }}
      uses: aws-actions/amazon-ecr-login@f2e9fc6c2b355c1890b65e6f6f0e2ac3e6e22f78 # v2.1.2
      with:
        registry-type: ${{ steps.validate.outputs.registry-type }}
        mask-password: "true"

    - name: Check if image tags exist
      id: check
      shell: bash
      env:
        AWS_REGION: ${{ inputs.aws-region }}
        TAGS: ${{ inputs.tags }}
        REGISTRY_TYPE: ${{ steps.validate.outputs.registry-type }}
        REPOSITORY_NAME: ${{ steps.validate.outputs.repository-name }}
      run: |
        set -euo pipefail

        if [[ "${REGISTRY_TYPE}" == "public" ]]; then
          ecr_cmd=(aws ecr-public describe-images)
        else
          ecr_cmd=(aws ecr describe-images --region "${AWS_REGION}")
        fi

        exists=false

        while IFS= read -r tag; do
          [[ -n "$tag" ]] || continue
          tag="${tag%$'\r'}"

          echo "Checking for tag: ${tag}"

          if output=$("${ecr_cmd[@]}" \
            --repository-name "${REPOSITORY_NAME}" \
            --image-ids "imageTag=${tag}" \
            --no-cli-pager 2>&1); then
            echo "Found existing tag: ${tag}"
            exists=true
          else
            case "${output}" in
              *ImageNotFoundException*)
                echo "Tag does not exist: ${tag}"
                ;;
              *)
                echo "::error::Failed checking tag ${tag}"
                echo "${output}"
                exit 1
                ;;
            esac
          fi
        done <<< "${TAGS}"

        echo "exists=${exists}" | tee -a "${GITHUB_OUTPUT}"

    - name: Assert non-existence of tags
      if:
        ${{ inputs.assert-non-existence == 'true' && steps.check.outputs.exists
        == 'true' }}
      shell: bash
      run: |
        echo "::error::One or more provided tags already exist in ECR."
        exit 1
