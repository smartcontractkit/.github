name: changed-files-filter
description:
  "Filters changed files for a GitHub event according to named glob filter
  patterns, with clear negation semantics"

inputs:
  github-token:
    description: "GitHub token to use for authentication"
    default: ${{ github.token }}
    required: false

  repository-root:
    description: |
      The root directory of the repository. Used for git-based changed file detection on push
      and merge_group events. Defaults to the GitHub Actions workspace.
    default: ${{ github.workspace }}
    required: false

  categories:
    description: |
      An optional YAML string defining named pattern groups that filters can reference.
      Each category is a key mapping to a list of glob patterns (which may include
      negated patterns starting with !). Categories are resolved by name when
      building a filter's effective pattern set.
    required: false

  filters:
    description: |
      A YAML string defining named filters. Each filter is a mapping with optional
      "categories" (a list of category names to include) and "paths" (a list of
      additional glob patterns). At least one of "categories" or "paths" is required
      per filter, and the combined pattern set must include at least one positive pattern.
      Patterns starting with ! are exclusion patterns applied before positive matching.
      See the README for full semantics and examples.
    required: true

outputs:
  filters-matched:
    description: "Comma-separated list of filter names that matched"
  filters-not-matched:
    description: "Comma-separated list of filter names that did not match"
  filters-matched-json:
    description: "JSON array of filter names that matched"
  filters-not-matched-json:
    description: "JSON array of filter names that did not match"

runs:
  using: "node20"
  main: "dist/index.js"
