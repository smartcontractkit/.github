# Paths to exclude from CCIP-related triggers.
# Referenced as !ccip-excluded in triggers to negate the whole set.
ccip-excluded:
  - "system-tests/**"
  - "core/scripts/cre/**"
  - "devenv/**"

# Files that are relevant to CCIP jobs.
ccip-files:
  - ".github/workflows/integration-in-memory-tests.yml"
  - ".github/integration-in-memory-tests.yml"
  - "**/*.go"
  - "**/*go.sum"
  - "**/*go.mod"
  - "**/*Dockerfile"
  - "core/**/migrations/*.sql"
  - "core/**/config/**/*.toml"
  - "integration-tests/**/*.toml"
  - "**/*ccip*"
  - "**/*ccip*/**"
