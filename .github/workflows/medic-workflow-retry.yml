name: Medic - Workflow Retry

on:
  workflow_call:
    secrets:
      GCP_SERVICE_ACCOUNT_KEY:
        required: true
      GCP_PROJECT_ID:
        required: true

permissions:
  actions: write
  checks: read
  pull-requests: write
  contents: read

concurrency:
  group: medic-retry-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Parse and validate the /medic retry command
  # ────────────────────────────────────────────────────────────────────────────
  parse-command:
    name: "Parse /medic retry"
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/medic') &&
      contains(github.event.comment.body, 'retry')
    runs-on: ubuntu-latest
    outputs:
      should_retry: ${{ steps.parse.outputs.should_retry }}
      pr_number: ${{ steps.parse.outputs.pr_number }}
      commenter_login: ${{ steps.parse.outputs.commenter_login }}
    steps:
      - name: React with eyes
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=eyes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout caller repo
        uses: actions/checkout@v4

      - name: Checkout medic
        uses: actions/checkout@v4
        with:
          repository: smartcontractkit/medic-test
          path: _medic

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Parse command
        id: parse
        run: node _medic/.github/actions/medic/dist/workflow-retry-parser/index.js
        env:
          INPUT_GITHUB-TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_COMMENT-BODY: ${{ github.event.comment.body }}
          INPUT_ISSUE-NUMBER: ${{ github.event.issue.number }}
          INPUT_COMMENTER-LOGIN: ${{ github.event.comment.user.login }}

  # ────────────────────────────────────────────────────────────────────────────
  # Retry failed workflows
  # ────────────────────────────────────────────────────────────────────────────
  retry-workflows:
    name: "Retry Workflows"
    needs: parse-command
    if: needs.parse-command.outputs.should_retry == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}'
          create_credentials_file: true
          export_environment_variables: true

      - name: Retry failed workflows
        uses: smartcontractkit/medic-test/.github/actions/medic/workflow-retry@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ needs.parse-command.outputs.pr_number }}
          commenter-login: ${{ needs.parse-command.outputs.commenter_login }}
        env:
          ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          CLOUD_ML_REGION: 'us-east5'

      - name: React success
        if: success()
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content="+1" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: React failure
        if: failure()
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content="-1" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
