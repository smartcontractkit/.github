name: Medic - Auto Workflow Retry

on:
  workflow_call:
    secrets:
      GCP_SERVICE_ACCOUNT_KEY:
        required: true
      GCP_PROJECT_ID:
        required: true

permissions:
  actions: write
  checks: read
  pull-requests: write
  contents: read

concurrency:
  group: medic-auto-retry-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  auto-retry:
    name: "Auto Retry Failed Workflow"
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}'
          create_credentials_file: true
          export_environment_variables: true

      - name: Auto retry failed workflow
        uses: smartcontractkit/medic-test/.github/actions/medic/workflow-retry-auto@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          CLOUD_ML_REGION: 'us-east5'
