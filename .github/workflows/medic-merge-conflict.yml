name: Medic - Merge Conflict Resolution

on:
  workflow_call:
    inputs:
      dry-run:
        description: 'Skip actual changes (push, comments, labels)'
        type: boolean
        default: false
      mock-claude:
        description: 'Skip Claude invocation (use mock response)'
        type: boolean
        default: false
      pr-number:
        description: 'Test specific PR number (bypasses conflict scan)'
        type: string
        default: ''
      generate-conflict:
        description: 'Generate a test PR with merge conflict'
        type: boolean
        default: false
    secrets:
      GCP_SERVICE_ACCOUNT_KEY:
        required: true
      GCP_PROJECT_ID:
        required: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: medic-${{ github.event.issue.number || inputs.generate-conflict && 'generate' || 'cron' }}
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Handle /medic: comment commands (comment trigger only)
  # ────────────────────────────────────────────────────────────────────────────
  handle-comment:
    name: "Parse /medic: Command"
    if: >
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '/medic:')
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.parse.outputs.should_run }}
      pr_data: ${{ steps.parse.outputs.pr_data }}
    steps:
      - name: React with eyes
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=eyes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout caller repo
        uses: actions/checkout@v4

      - name: Checkout medic
        uses: actions/checkout@v4
        with:
          repository: smartcontractkit/medic-test
          path: _medic

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Parse comment
        id: parse
        run: node _medic/.github/actions/medic/dist/comment-parser/index.js
        env:
          INPUT_GITHUB-TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_COMMENT-BODY: ${{ github.event.comment.body }}
          INPUT_ISSUE-NUMBER: ${{ github.event.issue.number }}
          INPUT_COMMENTER-LOGIN: ${{ github.event.comment.user.login }}

  # ────────────────────────────────────────────────────────────────────────────
  # Handle /medic generate conflict command
  # ────────────────────────────────────────────────────────────────────────────
  handle-generate-comment:
    name: "Parse Generate Command"
    if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '/medic generate conflict')
    runs-on: ubuntu-latest
    outputs:
      should_generate: ${{ steps.check.outputs.should_generate }}
    steps:
      - name: Check command
        id: check
        run: |
          echo "Found /medic generate conflict command"
          echo "should_generate=true" >> $GITHUB_OUTPUT

  # ────────────────────────────────────────────────────────────────────────────
  # Generate test PR with merge conflict
  # ────────────────────────────────────────────────────────────────────────────
  generate-conflict:
    name: "Generate Conflict PR"
    needs: handle-generate-comment
    if: |
      always() && (
        (github.event_name == 'issue_comment' && needs.handle-generate-comment.outputs.should_generate == 'true') ||
        (github.event_name == 'workflow_dispatch' && inputs.generate-conflict == true)
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout medic
        uses: actions/checkout@v4
        with:
          repository: smartcontractkit/medic-test
          path: _medic

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate conflict PR
        run: node _medic/.github/actions/medic/dist/conflict-generator/index.js
        env:
          INPUT_GITHUB-TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TRIGGER-TYPE: ${{ github.event_name == 'issue_comment' && 'comment' || 'dispatch' }}
          INPUT_ISSUE-NUMBER: ${{ github.event.issue.number || '' }}
          INPUT_COMMENTER-LOGIN: ${{ github.event.comment.user.login || '' }}

      - name: React success
        if: success() && github.event_name == 'issue_comment'
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content="+1" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: React failure
        if: failure() && github.event_name == 'issue_comment'
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content="-1" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────────────────────────────────
  # Scan for PRs with merge conflicts (cron/dispatch only)
  # ────────────────────────────────────────────────────────────────────────────
  find-conflicts:
    name: "Find Conflicting PRs"
    if: github.event_name != 'issue_comment' && inputs.generate-conflict != true
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.result.outputs.matrix }}
      has_conflicts: ${{ steps.result.outputs.has_conflicts }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      - name: Checkout medic
        uses: actions/checkout@v4
        with:
          repository: smartcontractkit/medic-test
          path: _medic

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Use specified PR
        id: direct-pr
        if: inputs.pr-number != ''
        run: |
          PR_DATA=$(gh pr view ${{ inputs.pr-number }} --json number,headRefName,baseRefName,author --jq '{number: .number, headRefName: .headRefName, baseRefName: .baseRefName, author: .author.login, currentAttempts: 0}')
          MATRIX="{\"include\":[$PR_DATA]}"
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "has_conflicts=true" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan all PRs
        id: scan
        if: inputs.pr-number == ''
        run: node _medic/.github/actions/medic/dist/checker/index.js
        env:
          INPUT_GITHUB-TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set result
        id: result
        env:
          DIRECT_PR_MATRIX: ${{ steps.direct-pr.outputs.matrix }}
          DIRECT_PR_HAS_CONFLICTS: ${{ steps.direct-pr.outputs.has_conflicts }}
          SCAN_MATRIX: ${{ steps.scan.outputs.matrix }}
          SCAN_HAS_CONFLICTS: ${{ steps.scan.outputs.has_conflicts }}
        run: |
          if [ -n "$DIRECT_PR_MATRIX" ]; then
            echo "matrix=$DIRECT_PR_MATRIX" >> $GITHUB_OUTPUT
            echo "has_conflicts=$DIRECT_PR_HAS_CONFLICTS" >> $GITHUB_OUTPUT
          else
            echo "matrix=$SCAN_MATRIX" >> $GITHUB_OUTPUT
            echo "has_conflicts=$SCAN_HAS_CONFLICTS" >> $GITHUB_OUTPUT
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # Combine results from comment or scan into work queue
  # ────────────────────────────────────────────────────────────────────────────
  prepare-work:
    name: "Prepare Work Queue"
    needs: [handle-comment, find-conflicts, handle-generate-comment]
    if: |
      always() &&
      needs.handle-generate-comment.outputs.should_generate != 'true' &&
      inputs.generate-conflict != true &&
      (needs.handle-comment.result == 'success' || needs.find-conflicts.result == 'success')
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.combine.outputs.matrix }}
      has_work: ${{ steps.combine.outputs.has_work }}
    steps:
      - name: Combine sources
        id: combine
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_SHOULD_RUN: ${{ needs.handle-comment.outputs.should_run }}
          COMMENT_PR_DATA: ${{ needs.handle-comment.outputs.pr_data }}
          SCAN_HAS_CONFLICTS: ${{ needs.find-conflicts.outputs.has_conflicts }}
          SCAN_MATRIX: ${{ needs.find-conflicts.outputs.matrix }}
        run: |
          if [ "$EVENT_NAME" == "issue_comment" ]; then
            if [ "$COMMENT_SHOULD_RUN" == "true" ]; then
              echo "matrix=$COMMENT_PR_DATA" >> $GITHUB_OUTPUT
              echo "has_work=true" >> $GITHUB_OUTPUT
            else
              echo 'matrix={"include":[]}' >> $GITHUB_OUTPUT
              echo "has_work=false" >> $GITHUB_OUTPUT
            fi
          else
            if [ "$SCAN_HAS_CONFLICTS" == "true" ]; then
              echo "matrix=$SCAN_MATRIX" >> $GITHUB_OUTPUT
              echo "has_work=true" >> $GITHUB_OUTPUT
            else
              echo 'matrix={"include":[]}' >> $GITHUB_OUTPUT
              echo "has_work=false" >> $GITHUB_OUTPUT
            fi
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # Resolve merge conflicts using Claude
  # ────────────────────────────────────────────────────────────────────────────
  resolve-conflicts:
    name: "Resolve PR #${{ matrix.number }}"
    needs: prepare-work
    if: always() && needs.prepare-work.result == 'success' && needs.prepare-work.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare-work.outputs.matrix) }}
      max-parallel: 3
      fail-fast: false

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.headRefName }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}'
          create_credentials_file: true
          export_environment_variables: true

      - name: Install Claude CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Install gitleaks
        run: |
          cd /tmp
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.1/gitleaks_8.18.1_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.1_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Resolve conflicts
        uses: smartcontractkit/medic-test/.github/actions/medic@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ matrix.number }}
          pr-branch: ${{ matrix.headRefName }}
          base-branch: ${{ matrix.baseRefName }}
          current-attempts: ${{ matrix.currentAttempts }}
          dry-run: ${{ inputs.dry-run || false }}
          mock-claude: ${{ inputs.mock-claude || false }}
          show-cost-in-comment: ${{ vars.MEDIC_SHOW_COST_IN_COMMENT || 'false' }}
        env:
          CLAUDE_CODE_USE_VERTEX: '1'
          CLOUD_ML_REGION: 'us-east5'
          ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          ANTHROPIC_MODEL: 'claude-sonnet-4@20250514'
          CI: 'true'
          TERM: 'dumb'
          NO_COLOR: '1'
          FORCE_COLOR: '0'
          DEBIAN_FRONTEND: 'noninteractive'
          DISABLE_TELEMETRY: '1'
          DISABLE_ERROR_REPORTING: '1'
          DISABLE_BUG_COMMAND: '1'
        timeout-minutes: 6

      - name: React success
        if: success() && github.event_name == 'issue_comment'
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content="+1" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: React failure
        if: failure() && github.event_name == 'issue_comment'
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content="-1" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
